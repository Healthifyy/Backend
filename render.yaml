services:
  - type: web
    name: healthify-api
    env: python
    buildCommand: "pip install -r requirements.txt && python ml/train_model.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: GEMINI_KEY_4
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
